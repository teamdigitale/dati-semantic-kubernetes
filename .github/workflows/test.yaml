name: Test development infrastructure.

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

jobs:
  test_infrastructure_dev:
    runs-on: ubuntu-latest
    name: Test the infrastructure
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: dev
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"
      - name: Run tests.
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests
          pytest -v
