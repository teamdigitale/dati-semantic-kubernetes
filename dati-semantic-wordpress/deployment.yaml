---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dati-semantic-wordpress
  name: dati-semantic-wordpress
  namespace: ndc-dev
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: dati-semantic-wordpress
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: dati-semantic-wordpress
      name: dati-semantic-wordpress
    spec:
      containers:
        - env:
            - name: XDG_CONFIG_HOME
              value: /tmp/
            - name: WORDPRESS_DEBUG
              value: "true"
            - name: WORDPRESS_DB_HOST
              value: db-testedev-mysql.mysql.database.azure.com
            - name: WORDPRESS_DB_USER
              value: sv_ndc_wp_ddl
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: sv-ndc-wp-psw
                  name: sv-ndc-wp-psw
            - name: WORDPRESS_DB_NAME
              value: sv_ndc_wp
            - name: WORDPRESS_TABLE_PREFIX
              value: wp_
            - name: MATOMO_API_URL
              value: https://analytics.istat.it/?module=API
            - name: MATOMO_SITE_ID
              value: "33"
            - name: MATOMO_USER
              value: dtd
            - name: MATOMO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: matomo-credentials
                  key: token
            - name: MATOMO_PASS
              valueFrom:
                secretKeyRef:
                  name: matomo-credentials
                  key: pass
            - name: API_URL
              value: /api
            - name: WORDPRESS_DEBUG
              value: ""
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('WP_HOME', 'https://' . $_SERVER['HTTP_HOST']);
                define('WP_SITEURL', 'https://' . $_SERVER['HTTP_HOST']);          
                
                // Matomo
                define('MATOMO_API_URL', getenv('MATOMO_API_URL'));
                define('MATOMO_TOKEN',   getenv('MATOMO_TOKEN'));
                define('MATOMO_USER',    getenv('MATOMO_USER'));
                define('MATOMO_PASS',    getenv('MATOMO_PASS'));
                define('MATOMO_SITE_ID', getenv('MATOMO_SITE_ID'));
                define('API_URL',        getenv('API_URL'));
          image: ghcr.io/teamdigitale/dati-semantic-wordpress:20251010-16-1874935
          name: dati-semantic-wordpress
          ports:
            - containerPort: 8080
              name: wordpress
              protocol: TCP
          resources:
            limits:
              cpu: 800m
              memory: 2048Mi
            requests:
              cpu: 250m
              memory: 512Mi
          terminationMessagePath: /dev/termination-log
          volumeMounts:
            - mountPath: /var/www/html
              name: wordpress-persistent-storage
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 75
      volumes:
        - name: wordpress-persistent-storage
          persistentVolumeClaim:
            claimName: wp-pv-claim
