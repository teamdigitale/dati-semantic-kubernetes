---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dati-semantic-wordpress
  name: dati-semantic-wordpress
  namespace: ndc-dev
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: dati-semantic-wordpress
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: dati-semantic-wordpress
    spec:

      # --- INIT CONTAINER PER RIPRISTINO DB ---
      initContainers:
        - name: init-db-decrypt-import
          image: mysql:8
          env:
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: sv-ndc-wp-psw
                  key: sv-ndc-wp-psw
            - name: GPG_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: wp-dev-gpg
                  key: passphrase
          command: ["sh", "-c"]
          args:
            - >
              gpg --batch --yes --passphrase "$GPG_PASSPHRASE"
              -d /mnt/snapshot/db.sql.tar.gz.gpg |
              tar xzO |
              mysql -h db-testedev-mysql.mysql.database.azure.com
              -u sv_ndc_wp_ddl
              sv_ndc_wp
          volumeMounts:
            - name: snapshot
              mountPath: /mnt/snapshot

      # --- WORDPRESS CONTAINER ---
      containers:
        - name: dati-semantic-wordpress
          image: ghcr.io/teamdigitale/dati-semantic-wordpress:latest
          ports:
            - containerPort: 8080
              name: wordpress
              protocol: TCP
          env:
            - name: XDG_CONFIG_HOME
              value: /tmp/
            - name: WORDPRESS_DB_HOST
              value: db-testedev-mysql.mysql.database.azure.com
            - name: WORDPRESS_DB_USER
              value: sv_ndc_wp_ddl
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sv-ndc-wp-psw
                  key: sv-ndc-wp-psw
            - name: WORDPRESS_DB_NAME
              value: sv_ndc_wp
            - name: WORDPRESS_TABLE_PREFIX
              value: wp_
            - name: MATOMO_API_URL
              value: https://analytics.istat.it/?module=API
            - name: MATOMO_SITE_ID
              value: "33"
            - name: MATOMO_USER
              value: dtd
            - name: MATOMO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: matomo-credentials
                  key: token
            - name: MATOMO_PASS
              valueFrom:
                secretKeyRef:
                  name: matomo-credentials
                  key: pass
            - name: API_URL
              value: https://ndc-dev.apps.cloudpub.testedev.istat.it/api
            - name: WORDPRESS_DEBUG
              value: "false"
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('WP_HOME', 'https://' . $_SERVER['HTTP_HOST']);
                define('WP_SITEURL', 'https://' . $_SERVER['HTTP_HOST']);

                // Matomo
                define('MATOMO_API_URL', getenv('MATOMO_API_URL'));
                define('MATOMO_TOKEN',   getenv('MATOMO_TOKEN'));
                define('MATOMO_USER',    getenv('MATOMO_USER'));
                define('MATOMO_PASS',    getenv('MATOMO_PASS'));
                define('MATOMO_SITE_ID', getenv('MATOMO_SITE_ID'));
                define('API_URL',        getenv('API_URL'));

                // PHP & WP resource limits
                define('WP_MEMORY_LIMIT', '512M');
                define('WP_MAX_MEMORY_LIMIT', '512M');
                @ini_set('upload_max_filesize', '64M');
                @ini_set('post_max_size', '64M');
                @ini_set('max_execution_time', '300');
                @ini_set('max_input_vars', '5000');
          resources:
            limits:
              cpu: 800m
              memory: 2048Mi
            requests:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - mountPath: /var/www/html
              name: wordpress-persistent-storage

      # --- VOLUMES ---
      volumes:
        - name: wordpress-persistent-storage
          persistentVolumeClaim:
            claimName: wp-pv-claim

        - name: snapshot
          persistentVolumeClaim:
            claimName: wp-snapshot-pv-claim
