---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dati-semantic-wordpress
  name: dati-semantic-wordpress
  namespace: ndc-dev
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: dati-semantic-wordpress
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: dati-semantic-wordpress
      name: dati-semantic-wordpress
    spec:
      # -------------------------------------------------------
      # fsGroup per gestire permessi del PVC
      # -------------------------------------------------------
      securityContext:
        fsGroup: 33
      # -------------------------------------------------------
      # InitContainer opzionale per correggere permessi se fsGroup non basta
      # -------------------------------------------------------
      initContainers:
        - name: fix-permissions
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Fixing permissions for /var/www/html"
              chown -R 33:33 /var/www/html || true
              chmod -R g+rwX /var/www/html || true
          volumeMounts:
            - name: wordpress-persistent-storage
              mountPath: /var/www/html
      containers:
        - name: dati-semantic-wordpress
          image: ghcr.io/teamdigitale/dati-semantic-wordpress:20251119-9-72311ef
          ports:
            - containerPort: 8080
              name: wordpress
              protocol: TCP
          env:
            - name: XDG_CONFIG_HOME
              value: /tmp/
            - name: WORDPRESS_DEBUG
              value: "true"
            - name: WORDPRESS_DB_HOST
              value: db-testedev-mysql.mysql.database.azure.com
            - name: WORDPRESS_DB_USER
              value: sv_ndc_wp_ddl
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: sv-ndc-wp-psw
                  name: sv-ndc-wp-psw
            - name: WORDPRESS_DB_NAME
              value: sv_ndc_wp
            - name: WORDPRESS_TABLE_PREFIX
              value: wp_
            - name: MATOMO_API_URL
              value: https://analytics.istat.it/?module=API
            - name: MATOMO_SITE_ID
              value: "33"
            - name: MATOMO_USER
              value: dtd
            - name: MATOMO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: matomo-credentials
                  key: token
            - name: MATOMO_PASS
              valueFrom:
                secretKeyRef:
                  name: matomo-credentials
                  key: pass
            - name: API_URL
              value: https://ndc-dev.apps.cloudpub.testedev.istat.it/api
            - name: WORDPRESS_CONFIG_EXTRA
              value: "define('WP_HOME', 'https://' . $_SERVER['HTTP_HOST']);\ndefine('WP_SITEURL', 'https://' . $_SERVER['HTTP_HOST']);          \n\n// Matomo\ndefine('MATOMO_API_URL', getenv('MATOMO_API_URL'));\ndefine('MATOMO_TOKEN',   getenv('MATOMO_TOKEN'));\ndefine('MATOMO_USER',    getenv('MATOMO_USER'));\ndefine('MATOMO_PASS',    getenv('MATOMO_PASS'));\ndefine('MATOMO_SITE_ID', getenv('MATOMO_SITE_ID'));\ndefine('API_URL',        getenv('API_URL'));\n\n// WordPress/PHP resource limits\ndefine('WP_MEMORY_LIMIT', '512M');\ndefine('WP_MAX_MEMORY_LIMIT', '512M');\n@ini_set('upload_max_filesize', '64M');\n@ini_set('post_max_size', '64M');\n@ini_set('max_execution_time', '300');\n@ini_set('max_input_vars', '5000');\n"
          resources:
            limits:
              cpu: 800m
              memory: 2048Mi
            requests:
              cpu: 250m
              memory: 512Mi
          terminationMessagePath: /dev/termination-log
          volumeMounts:
            - mountPath: /var/www/html
              name: wordpress-persistent-storage
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      terminationGracePeriodSeconds: 75
      volumes:
        - name: wordpress-persistent-storage
          persistentVolumeClaim:
            claimName: wp-pv-claim
