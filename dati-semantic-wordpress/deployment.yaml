---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dati-semantic-wordpress
  name: dati-semantic-wordpress
  namespace: ndc-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dati-semantic-wordpress
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: dati-semantic-wordpress
    spec:
      containers:
        - name: dati-semantic-wordpress
          image: ghcr.io/teamdigitale/dati-semantic-wordpress:20251121-45-afa273b
          ports:
            - containerPort: 8080
              name: wordpress
          # Esegue lo script appena Apache parte
          lifecycle:
            postStart:
              exec:
                command: ["/usr/local/bin/wp-bootstrap.sh"]
          # Readiness probe:
          # - Serve per evitare che il traffico arrivi al pod prima che WordPress sia realmente pronto.
          # - Finché questa probe non risponde correttamente (HTTP 200), il pod NON viene esposto
          readinessProbe:
            httpGet:
              path: /wp-login.php
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          # Liveness probe:
          # - Verifica che WordPress continui a rispondere correttamente nel tempo.
          # - Se Apache/PHP o WordPress si bloccano, Kubernetes riavvia automaticamente il container.
          # - Garantisce che il pod non rimanga "Running" ma in realtà non operativo.
          livenessProbe:
            httpGet:
              path: /wp-login.php
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          env:
            - name: XDG_CONFIG_HOME
              value: /tmp/
            - name: WORDPRESS_DB_HOST
              value: db-testedev-mysql.mysql.database.azure.com
            - name: WORDPRESS_DB_USER
              value: sv_ndc_wp_ddl
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sv-ndc-wp-psw
                  key: sv-ndc-wp-psw
            - name: WORDPRESS_DB_NAME
              value: sv_ndc_wp
            - name: WORDPRESS_TABLE_PREFIX
              value: wp_
            - name: MATOMO_API_URL
              value: https://analytics.istat.it/?module=API
            - name: MATOMO_SITE_ID
              value: "33"
            - name: MATOMO_USER
              value: dtd
            - name: MATOMO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: matomo-credentials
                  key: token
            - name: MATOMO_PASS
              valueFrom:
                secretKeyRef:
                  name: matomo-credentials
                  key: pass
            - name: API_URL
              value: https://ndc-dev.apps.cloudpub.testedev.istat.it/api
            - name: WORDPRESS_CONFIG_EXTRA
              value: |
                define('WP_HOME', 'https://' . $_SERVER['HTTP_HOST']);
                define('WP_SITEURL', 'https://' . $_SERVER['HTTP_HOST']);

                define('MATOMO_API_URL', getenv('MATOMO_API_URL'));
                define('MATOMO_TOKEN',   getenv('MATOMO_TOKEN'));
                define('MATOMO_USER',    getenv('MATOMO_USER'));
                define('MATOMO_PASS',    getenv('MATOMO_PASS'));
                define('MATOMO_SITE_ID', getenv('MATOMO_SITE_ID'));
                define('API_URL',        getenv('API_URL'));

                define('WP_MEMORY_LIMIT', '512M');
                define('WP_MAX_MEMORY_LIMIT', '512M');
                @ini_set('upload_max_filesize', '64M');
                @ini_set('post_max_size', '64M');
                @ini_set('max_execution_time', '300');
                @ini_set('max_input_vars', '5000');
          resources:
            limits:
              cpu: 800m
              memory: 2048Mi
            requests:
              cpu: 250m
              memory: 512Mi
          volumeMounts:
            - name: wordpress-persistent-storage
              mountPath: /var/www/html
      volumes:
        - name: wordpress-persistent-storage
          persistentVolumeClaim:
            claimName: wp-pv-claim
